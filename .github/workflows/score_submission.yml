name: Score Submission

on:
  push:
    branches:
      - main
    paths:
      - 'submissions/**'
      - '!submissions/README.md'
  pull_request:
    paths:
      - 'submissions/**'
      - '!submissions/README.md'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas scikit-learn pyyaml pycryptodome

      - name: Run Evaluation
        id: eval_step
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Use git diff to find ONLY the .enc file added/changed in this specific PR
          # We look at the difference between the base branch (main) and the current PR head
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SUBMISSION_FILE=$(git diff --name-only origin/main...HEAD | grep 'submissions/.*\.enc$' | head -n 1)
          else
            SUBMISSION_FILE=$(find submissions -name "*.enc" | head -n 1)
          fi

          if [ -z "$SUBMISSION_FILE" ]; then 
            echo "ERROR: No submission file found in this PR."
            exit 1
          fi

          # 2. Derive team name from the folder path
          TEAM_NAME=$(basename $(dirname "$SUBMISSION_FILE"))
          echo "Detected Team: $TEAM_NAME"
          
          # 3. Run evaluation
          python competition/evaluate.py --file "$SUBMISSION_FILE" | tee evaluation_output.txt
          
          # 4. Extract score
          SCORE=$(grep "SCORE_MAE" evaluation_output.txt | awk '{print $2}')
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT

      - name: Post Score to PR
        # This ONLY runs on the Pull Request (Review Phase)
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            **Team:** `${{ steps.eval_step.outputs.team_name }}`
            **Score (MAE):** `${{ steps.eval_step.outputs.score || 'Error Computing Score' }}`
            
            ---
            *Note: The leaderboard will only be updated once a maintainer merges this Pull Request.*

      - name: Update Leaderboard (Merge Phase)
        # This ONLY runs when the code is pushed/merged to main
        if: github.event_name == 'push' && steps.eval_step.outputs.score != ''
        run: |
          TEAM="${{ steps.eval_step.outputs.team_name }}"
          SCORE="${{ steps.eval_step.outputs.score }}"
          mkdir -p leaderboard
          
          # CSV Update Logic
          if [ ! -f leaderboard/leaderboard.csv ]; then echo "Rank,Team,MAE" > leaderboard/leaderboard.csv; fi
          echo "0,$TEAM,$SCORE" >> leaderboard/leaderboard.csv
          
          python3 -c "
          import pandas as pd
          df = pd.read_csv('leaderboard/leaderboard.csv')
          
          # Standardize column names
          df.columns = [c.lower() for c in df.columns]
          
          # Clean data
          df['mae'] = pd.to_numeric(df['mae'], errors='coerce')
          df = df.dropna(subset=['mae'])
          
          # SORT: Lowest MAE first
          df = df.sort_values('mae')
          
          # DENSE RANKING: (1, 1, 2, 3)
          # 'dense' keeps the rank incrementing by 1 for the next unique value
          df['rank'] = df['mae'].rank(method='dense').astype(int)
          
          # Reorder columns and save
          df = df[['rank', 'team', 'mae']]
          df.columns = [c.capitalize() for c in df.columns]
          df.to_csv('leaderboard/leaderboard.csv', index=False)
          "
          
          # Markdown Generation
          echo "# 🏆 Competition Leaderboard" > leaderboard/LEADERBOARD.md
          echo "Last updated: $(date -u)" >> leaderboard/LEADERBOARD.md
          echo -e "\n| Rank | Team | MAE Score |\n|------|------|-----------|" >> leaderboard/LEADERBOARD.md
          tail -n +2 leaderboard/leaderboard.csv | awk -F, '{printf "| %s | %s | %s |\n", $1, $2, $3}' >> leaderboard/LEADERBOARD.md

      - name: Commit and Push Leaderboard
        if: github.event_name == 'push' && steps.eval_step.outputs.score != ''
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "actions@github.com"
          
          # Capture current values
          TEAM="${{ steps.eval_step.outputs.team_name }}"
          SCORE="${{ steps.eval_step.outputs.score }}"

          # 1. Sync with the absolute latest from main
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          
          # 2. Add the new entry to the fresh CSV
          mkdir -p leaderboard
          if [ ! -f leaderboard/leaderboard.csv ]; then echo "Rank,Team,MAE" > leaderboard/leaderboard.csv; fi
          echo "0,$TEAM,$SCORE" >> leaderboard/leaderboard.csv
          
          # 3. Run the Dense Ranker (1,1,2,3)
          python3 -c "
          import pandas as pd
          df = pd.read_csv('leaderboard/leaderboard.csv')
          df.columns = [c.lower() for c in df.columns]
          df['mae'] = pd.to_numeric(df['mae'], errors='coerce')
          df = df.dropna(subset=['mae']).sort_values('mae')
          df['rank'] = df['mae'].rank(method='dense').astype(int)
          df = df[['rank', 'team', 'mae']]
          df.columns = [c.capitalize() for c in df.columns]
          df.to_csv('leaderboard/leaderboard.csv', index=False)
          "

          # 4. Regenerate Markdown 
          echo "# 🏆 Competition Leaderboard" > leaderboard/LEADERBOARD.md
          echo "Last updated: $(date -u)" >> leaderboard/LEADERBOARD.md
          echo -e "\n| Rank | Team | MAE Score |\n|------|------|-----------|" >> leaderboard/LEADERBOARD.md
          tail -n +2 leaderboard/leaderboard.csv | awk -F, '{printf "| %s | %s | %s |\n", $1, $2, $3}' >> leaderboard/LEADERBOARD.md
          
          # 5. Push the clean update
          git add leaderboard/
          git commit -m "Update leaderboard for $TEAM" || exit 0
          git push origin main