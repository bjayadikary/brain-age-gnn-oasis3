name: Update Leaderboard

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'leaderboard/**'
      - 'docs/**'
  workflow_dispatch: 

jobs:
  leaderboard_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pycryptodome tabulate scikit-learn

      - name: Run Leaderboard Update
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # We pass the 'latest commit' info so the script knows what was merged
          python update_leaderboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "Leaderboard Bot"
          git config --local user.email "actions@github.com"
          
          # Use -f to ensure files are tracked even if in .gitignore
          git add -f leaderboard/leaderboard.csv leaderboard/LEADERBOARD.md docs/leaderboard.html || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🏆 Update Leaderboard [skip ci]"
            git push origin HEAD:main
          fi