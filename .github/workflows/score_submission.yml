name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Detect the file and extract Team Name
          FILE=$(git diff --name-only origin/main...HEAD | grep 'submissions/.*\.enc$' | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "No .enc file detected."
            exit 1
          fi

          # Extract filename without path and extension (e.g., submissions/team_alpha.enc -> team_alpha)
          FILENAME=$(basename "$FILE")
          TEAM_NAME="${FILENAME%.*}"
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          
          # 2. Run the evaluation
          python competition/evaluate.py --file "$FILE" | tee out.txt
          
          # 3. Extract score and force 8 decimal precision using 'printf'
          RAW_SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
          
          if [ -z "$RAW_SCORE" ] || [ "$RAW_SCORE" == "None" ]; then
            echo "score=Error Computing Score" >> $GITHUB_OUTPUT
          else
            # Formats the number to 8 decimal places
            FORMATTED_SCORE=$(printf "%.8f" $RAW_SCORE)
            echo "score=$FORMATTED_SCORE" >> $GITHUB_OUTPUT
          fi

      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ---
            *Note: The official leaderboard will update automatically once this Pull Request is merged into the main branch.*