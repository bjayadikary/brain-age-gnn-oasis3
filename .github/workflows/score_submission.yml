name: Score Submission

on:
  pull_request_target:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Fetch PR branch
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git checkout pr_branch -- submissions/

          # 2. Find submission file(s) changed relative to main
          # Use -- to let git handle the glob (avoids bash expansion crash)
          CHANGED_FILES=$(git diff --name-only origin/main...pr_branch -- 'submissions/*.enc' \
            | grep -v "sample_submission.enc" || true)

          # Fix: use -z to properly check for empty string
          if [ -z "$CHANGED_FILES" ]; then
              NUM_CHANGED=0
          else
              NUM_CHANGED=$(echo "$CHANGED_FILES" | wc -l)
          fi

          if [ "$NUM_CHANGED" -eq 0 ]; then
              FILE=""
              echo "multi_note=⚠️ No submission detected in this PR." >> $GITHUB_OUTPUT
          elif [ "$NUM_CHANGED" -eq 1 ]; then
              FILE="$CHANGED_FILES"
              echo "multi_note=✅ Evaluating: \`$FILE\`" >> $GITHUB_OUTPUT
          else
              FILE=""
              echo "multi_note=⚠️ Multiple submissions detected! Only one submission per PR is allowed." >> $GITHUB_OUTPUT
          fi

          # 3. Extract team name
          if [ -n "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              TEAM_NAME="${FILENAME%.*}"
              echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          else
              echo "team_name=Unknown" >> $GITHUB_OUTPUT
          fi

          # 4. Score
          if [ -n "$FILE" ]; then
              python competition/evaluate.py --file "$FILE" | tee out.txt
              RAW_SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
              if [ -z "$RAW_SCORE" ] || [ "$RAW_SCORE" == "None" ]; then
                  echo "score=Error" >> $GITHUB_OUTPUT
              else
                  FORMATTED_SCORE=$(printf "%.8f" $RAW_SCORE)
                  echo "score=$FORMATTED_SCORE" >> $GITHUB_OUTPUT
              fi
          else
              echo "score=Not Evaluated" >> $GITHUB_OUTPUT
          fi
          
      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name || 'Unknown' }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ${{ steps.eval.outputs.multi_note }}

            ---
            📌 **Note:** The leaderboard will be updated after this PR is merged into `main`.